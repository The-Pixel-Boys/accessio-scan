name: Publish to npm

# Fires on any semver tag push (e.g. v0.1.0, v0.1.1, v1.0.0). The same
# workflow publishes a GitHub release with the tag's changelog.
#
# Required repo secrets:
#   NPM_TOKEN — an npm automation token with publish rights on the
#               `accessio-scan` package.

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    name: Publish release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write   # create GitHub release
      id-token: write   # npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
